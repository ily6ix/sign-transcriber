{% extends "base.html" %}

{% block content %}
<div class="error-container">
    <div class="error-box">
        <div class="error-code">500</div>
        <h1>Server Error</h1>
        <p>Something went wrong. Our team has been notified.</p>
        <a href="{{ url_for('index') }}" class="btn btn-primary">🏠 Go Home</a>
    </div>
</div>

<style>
.error-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 20px;
}

.error-box {
    background: white;
    padding: 60px 40px;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    text-align: center;
    max-width: 500px;
}

.error-code {
    font-size: 5rem;
    font-weight: bold;
    color: #ef4444;
    margin-bottom: 20px;
}

.error-box h1 {
    font-size: 2rem;
    color: #1f2937;
    margin-bottom: 10px;
}

.error-box p {
    color: #6b7280;
    margin-bottom: 30px;
    font-size: 1.1rem;
}

.btn {
    display: inline-block;
    padding: 12px 30px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-weight: 600;
    transition: all 0.3s ease;
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
}
</style>
{% endblock %}
